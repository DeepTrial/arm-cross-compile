name: Build and Test

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'images/**'
      - 'exports/**'
  pull_request:
    branches: [ main, master ]
    paths-ignore:
      - 'images/**'
      - 'exports/**'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml flake8
    
    - name: Lint with flake8
      run: |
        flake8 cross-toolchain.py --count --select=E9,F63,F7,F82 --show-source --statistics

  generate-dockerfile:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        config: [default.yaml, from-source.yaml]
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install pyyaml
    
    - name: Generate Dockerfile
      run: |
        python cross-toolchain.py generate configs/${{ matrix.config }} -o /tmp/Dockerfile.${{ matrix.config }}
        cat /tmp/Dockerfile.${{ matrix.config }}
    
    - name: Upload Dockerfile
      uses: actions/upload-artifact@v4
      with:
        name: dockerfile-${{ matrix.config }}
        path: /tmp/Dockerfile.${{ matrix.config }}

  build-image:
    runs-on: ubuntu-latest
    needs: generate-dockerfile
    if: github.event_name == 'push' && contains(github.ref, 'main')
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: pip install pyyaml
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Build image
      run: |
        python cross-toolchain.py build configs/default.yaml -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
    
    - name: Test cross-compilation
      run: |
        echo '#include <stdio.h>' > /tmp/test.c
        echo 'int main() { printf("Hello ARM64!\n"); return 0; }' >> /tmp/test.c
        docker run --rm -v /tmp:/workspace ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
          /bin/bash -c 'aarch64-linux-gnu-gcc -o /workspace/test /workspace/test.c && file /workspace/test'
    
    - name: Push image to GHCR
      run: |
        docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        echo "✓ Image pushed to ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
    
    - name: Export image for artifact
      run: |
        docker save ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest | gzip > /tmp/arm-cross-latest.tar.gz
        ls -lh /tmp/arm-cross-latest.tar.gz
    
    - name: Upload image artifact
      uses: actions/upload-artifact@v4
      with:
        name: arm-cross-image
        path: /tmp/arm-cross-latest.tar.gz
        retention-days: 7
