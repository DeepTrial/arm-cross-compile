# Advanced: Build toolchain from source
# WARNING: This takes 60+ minutes and is complex. Use apt-based (default.yaml) instead.

name: from-source-example
base_image: debian:trixie-slim
architecture: arm64
description: Build GCC from source (advanced, not recommended)

versions:
  gcc: "14.2.0"
  glibc: "2.41"
  binutils: "2.44"
  gdb: "16.3"
  from_source: true

packages:
  # Build dependencies
  base:
    - build-essential
    - make
    - gawk
    - bison
    - flex
    - texinfo
    - gperf
    - wget
    - ca-certificates
  libs:
    - libgmp-dev
    - libmpfr-dev
    - libmpc-dev

env:
  DEBIAN_FRONTEND: noninteractive

custom_steps:
  - echo "This is an advanced configuration. See docs/build-from-source.md for details."
  - echo "Consider using apt-based installation (configs/default.yaml) instead."
