# ARM HF (ARMv7+) Cross-Compilation Environment Configuration
name: armhf-toolchain
base_image: ubuntu:22.04
architecture: armhf
description: ARM hard-float cross-compilation environment with gcc toolchain

toolchain:
  type: gcc
  prefix: arm-linux-gnueabihf
  packages:
    - crossbuild-essential-armhf
    - gcc-arm-linux-gnueabihf
    - g++-arm-linux-gnueabihf
    - libc6-dev-armhf-cross
    - libstdc++-11-dev-armhf-cross

packages:
  base:
    - build-essential
    - cmake
    - git
    - wget
    - curl
    - ca-certificates
  dev:
    - python3
    - python3-pip
    - gdb-multiarch
  qemu:
    - qemu-user-static
    - binfmt-support

env:
  DEBIAN_FRONTEND: noninteractive
  CROSS_COMPILE: arm-linux-gnueabihf-

custom_steps:
  - echo "ARM HF toolchain installed successfully"
