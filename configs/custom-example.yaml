# Custom ARM Cross-Compilation Environment Example
# This example shows how to create a custom environment with specific requirements

name: custom-armv7-env
base_image: ubuntu:20.04
architecture: armv7
description: Custom ARMv7 environment with additional libraries

toolchain:
  type: gcc
  prefix: arm-linux-gnueabihf
  packages:
    - gcc-arm-linux-gnueabihf
    - g++-arm-linux-gnueabihf
    - libc6-dev-armhf-cross

packages:
  base:
    - build-essential
    - cmake
    - git
  # Custom libraries for embedded development
  libs:
    - libncurses5-dev
    - libssl-dev
    - zlib1g-dev
  python:
    - python3
    - python3-pip
    - python3-venv

env:
  DEBIAN_FRONTEND: noninteractive
  CUSTOM_VAR: "my_value"
  BUILD_TYPE: "release"

# Mount points for development
volumes:
  - /dev:/dev

# Custom installation steps
custom_steps:
  - echo "Installing custom tools..."
  - mkdir -p /workspace/build
  - echo "Environment ready for ARMv7 development"
