# ARM Cross-Compilation Environment Configuration Template

# Environment name
name: my-arm-env

# Base Docker image
base_image: debian:trixie-slim

# Target architecture
architecture: arm64

# Description
description: ARM64 cross-compilation environment

# Tool versions (for apt-based installation)
versions:
  gcc: "14.2"
  glibc: "2.41"
  binutils: "2.44"
  gdb: "16.3"
  # Set to true to build from source (slower, more flexible)
  from_source: false

# CPU optimization (optional)
# Common values: cortex-a53, cortex-a72, cortex-a76, cortex-a720
cpu: cortex-a720

# Package categories
packages:
  base:
    - build-essential
    - make
    - cmake
    - git
    - wget
    - curl
  gcc:
    - gcc-14-aarch64-linux-gnu
    - g++-14-aarch64-linux-gnu
  libs:
    - libc6-dev-arm64-cross
    - binutils-aarch64-linux-gnu
    - gdb-multiarch
  qemu:
    - qemu-user-static
    - binfmt-support

# Environment variables
env:
  DEBIAN_FRONTEND: noninteractive
  CROSS_COMPILE: aarch64-linux-gnu-
  CC: aarch64-linux-gnu-gcc
  CXX: aarch64-linux-gnu-g++

# Custom installation steps (optional)
custom_steps:
  - echo "Cross-compile environment ready"
